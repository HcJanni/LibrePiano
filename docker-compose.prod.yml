services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    expose:
      - "8000"
    devices:
      - /dev/snd:/dev/snd   # ALSA MIDI-Zugriff (Yamaha P-125a via USB)
    group_add:
      - audio
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.prod.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
